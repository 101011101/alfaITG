<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alfa ITG — Industrial AI for Fortune 500 Manufacturing</title>

    <!-- Primary meta -->
    <meta
      name="description"
      content="Alfa ITG empowers Fortune 500 manufacturers with a proprietary Industrial AI suite — Generative AI on real-time line data that predicts, automates, and interprets. ITAR-registered."
    />
    <meta name="theme-color" content="#000000" />

    <!-- Warm the connection to Spline's CDN so the deferred 3D scene chunk +
         asset start with the DNS/TLS handshake already done. -->
    <link rel="preconnect" href="https://prod.spline.design" crossorigin />
    <link rel="dns-prefetch" href="https://prod.spline.design" />

    <!-- Preload the hero background image (LCP element) so it starts fetching
         immediately at high priority, before the JS bundle parses. -->
    <link
      rel="preload"
      as="image"
      href="/media/images/hero/f22-twilight.webp"
      fetchpriority="high"
    />

    <!-- TODO(dev): replace https://www.alfaitg.com/ with the real production domain. -->
    <link rel="canonical" href="https://www.alfaitg.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Alfa ITG" />
    <meta property="og:title" content="Alfa ITG — Industrial AI for Fortune 500 Manufacturing" />
    <meta
      property="og:description"
      content="A proprietary Industrial AI suite leveraging Generative AI on real-time line data — predicting, automating, and interpreting action across the line. ITAR-registered, trusted since 1990."
    />
    <meta property="og:url" content="https://www.alfaitg.com/" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Alfa ITG — Industrial AI for Fortune 500 Manufacturing" />
    <meta
      name="twitter:description"
      content="A proprietary Industrial AI suite leveraging Generative AI on real-time line data — predicting, automating, and interpreting action across the line. ITAR-registered, trusted since 1990."
    />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Icons & PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Alfa ITG",
        "url": "https://www.alfaitg.com/",
        "logo": "https://www.alfaitg.com/favicon.svg",
        "description": "Alfa ITG delivers Industrial AI to Fortune 500 manufacturers — a proprietary suite leveraging Generative AI on real-time line data to predict, automate, and interpret action across the line. ITAR-registered.",
        "foundingDate": "1990"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
