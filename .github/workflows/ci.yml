name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: prototype/splash/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: prototype/splash
      - name: Lint
        run: npm run lint
        working-directory: prototype/splash
      - name: Build
        run: npm run build
        working-directory: prototype/splash
